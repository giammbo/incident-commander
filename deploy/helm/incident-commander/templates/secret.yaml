{{- include "ic.requireSecrets" . -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  annotations:
    # Hook (weight 0 < migrate Job's 5) so the inline secret exists before the pre-install
    # migrate Job; before-hook-creation (not hook-succeeded) keeps it for the app Deployment too.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
  name: {{ include "ic.fullname" . }}
  labels: {{- include "ic.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ .Values.secrets.sessionSecret | quote }}
  FERNET_KEYS: {{ .Values.secrets.fernetKeys | quote }}
{{- end }}

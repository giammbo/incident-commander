name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Tests
        # testcontainers spins up Postgres via Docker, which is available on GitHub-hosted runners.
        run: uv run pytest -q

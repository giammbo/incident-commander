name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive versions
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.1.0
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${TAG#v}" >> "$GITHUB_OUTPUT"   # 0.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/giammbo/incident-commander:${{ steps.ver.outputs.image_tag }}
            ghcr.io/giammbo/incident-commander:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Package & push chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package deploy/helm/incident-commander \
            --version "${{ steps.ver.outputs.chart_version }}" \
            --app-version "${{ steps.ver.outputs.image_tag }}"
          helm push "incident-commander-${{ steps.ver.outputs.chart_version }}.tgz" oci://ghcr.io/giammbo/charts
